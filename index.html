<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon or Military?</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #111110;
  --surface: #1a1a18;
  --card: #1f1f1d;
  --border: #2a2a28;
  --text: #f0ede6;
  --muted: #666660;
  --subtle: #333330;
  --correct: #22c55e;
  --wrong: #ef4444;
  --radius: 22px;
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Syne', sans-serif;
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ─── SCREENS ─── */
.screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
.screen.active { display: flex; animation: up 0.42s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes up { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

/* ─── FLASH ─── */
#flash {
  position: fixed; inset: 0; z-index: 999; pointer-events: none; opacity: 0;
}
/* FIX #4: flash uses JS-only animation, no CSS transition conflict */

/* ─── PROGRESS ─── */
.progress {
  position: fixed; top: 0; left: 0; height: 2px;
  background: #444; width: 0%;
  transition: width 0.5s cubic-bezier(.4,0,.2,1); z-index: 100;
}

/* ─── HEADER ─── */
header {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 20px 28px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 50;
}

.btn-back-menu {
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  font-family: 'Syne', sans-serif; font-size: 0.62rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
  padding: 7px 14px; border-radius: 8px;
  transition: color 0.15s, border-color 0.15s;
  display: flex; align-items: center; gap: 5px;
}
.btn-back-menu:hover { color: var(--text); border-color: #555; }

.header-right { display: flex; align-items: center; gap: 20px; }

/* lives */
.lives { display: flex; gap: 5px; align-items: center; }
.life { font-size: 1rem; transition: all 0.25s; }
.life.lost { opacity: 0.15; filter: grayscale(1); transform: scale(0.8); }

/* FIX #7: .shake is actually used now in JS for lost life feedback */
@keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-5px);} 40%{transform:translateX(5px);} 60%{transform:translateX(-3px);} 80%{transform:translateX(3px);} }
.shake { animation: shake 0.32s ease; }

.stats { display: flex; align-items: center; gap: 20px; }
.stat { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.stat-val { font-size: 1.1rem; font-weight: 800; line-height: 1; font-family: 'DM Mono', monospace; }
.stat-lbl { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
.stat-sep { width: 1px; height: 26px; background: var(--border); }

/* ─── MENU ─── */
#menu { gap: 44px; }

.menu-header { text-align: center; display: flex; flex-direction: column; gap: 8px; }
.menu-header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
.menu-header p { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; }

.mode-cards { display: flex; flex-direction: column; gap: 12px; width: 310px; }

.mode-card {
  width: 100%; padding: 22px;
  border-radius: 18px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
  font-family: 'Syne', sans-serif; cursor: pointer;
  text-align: left; display: flex; align-items: center; gap: 18px;
  transition: border-color 0.15s, background 0.15s, transform 0.12s;
}
.mode-card:hover { background: var(--subtle); border-color: #3a3a38; transform: translateY(-2px); }
.mode-card:active { transform: scale(0.98); }
.mode-card.infinite:hover { border-color: #4a5e38; }
.mode-card.survival:hover { border-color: #8b2020; }

.mode-icon {
  width: 48px; height: 48px; border-radius: 14px;
  background: var(--card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; flex-shrink: 0;
}
.mode-info { display: flex; flex-direction: column; gap: 4px; }
.mode-name { font-size: 1rem; font-weight: 700; letter-spacing: 0.01em; }
.mode-desc { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.06em; line-height: 1.5; }

.mode-badge {
  margin-left: auto; flex-shrink: 0;
  font-size: 0.52rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 100px;
}
.badge-inf  { background: rgba(74,94,56,0.3);  color: #7ab055; border: 1px solid #4a5e38; }
.badge-surv { background: rgba(139,32,32,0.3); color: #e05555; border: 1px solid #8b2020; }

/* ─── GAME ─── */
#game { flex-direction: column; align-items: center; gap: 0; }

.scene {
  position: relative; width: 340px; height: 420px;
  cursor: grab; margin-top: 60px;
}
.scene:active { cursor: grabbing; }

.card-behind {
  position: absolute; inset: 0;
  background: var(--card); border-radius: var(--radius); border: 1px solid var(--border);
  transform: rotate(2.5deg) translateY(6px) scale(0.97);
}
.card-behind-2 {
  position: absolute; inset: 0;
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  transform: rotate(-1.5deg) translateY(11px) scale(0.94); opacity: 0.5;
}
.card {
  position: absolute; inset: 0;
  background: var(--card); border-radius: var(--radius); border: 1px solid var(--border);
  box-shadow: 0 8px 48px rgba(0,0,0,0.45);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 48px 40px; text-align: center;
  user-select: none; will-change: transform; touch-action: none; z-index: 10; overflow: hidden;
}
.card:active { cursor: grabbing; }

/* unused tint div removed — camo & poke-tint cover both cases */

/* camo layer — revealed on left swipe */
.card-camo {
  position: absolute; inset: 0; border-radius: var(--radius); pointer-events: none;
  opacity: 0;
  background-color: #2e3d22;
  background-image:
    radial-gradient(ellipse 90px 55px  at  8% 18%, #243318 0%, transparent 90%),
    radial-gradient(ellipse 70px 90px  at 28% 72%, #1e2c14 0%, transparent 90%),
    radial-gradient(ellipse 55px 70px  at 55% 10%, #364826 0%, transparent 90%),
    radial-gradient(ellipse 110px 50px at 80% 42%, #243018 0%, transparent 90%),
    radial-gradient(ellipse 65px 95px  at 48% 85%, #2d3e1e 0%, transparent 90%),
    radial-gradient(ellipse 45px 55px  at 14% 55%, #3a5028 0%, transparent 90%),
    radial-gradient(ellipse 80px 45px  at 68% 68%, #2a3a1c 0%, transparent 90%),
    radial-gradient(ellipse 60px 75px  at 90% 12%, #1e2c14 0%, transparent 90%),
    radial-gradient(ellipse 50px 60px  at 35% 38%, #405530 0%, transparent 90%),
    radial-gradient(ellipse 75px 40px  at 72% 28%, #344424 0%, transparent 90%),
    radial-gradient(ellipse 40px 65px  at 18% 90%, #2a3c1a 0%, transparent 90%),
    radial-gradient(ellipse 95px 35px  at 60% 52%, #1c2a12 0%, transparent 90%);
}

/* pokeball tint layer — revealed on right swipe */
.card-poke-tint {
  position: absolute; inset: 0; border-radius: var(--radius); pointer-events: none;
  opacity: 0;
  background: linear-gradient(to bottom, rgba(160,15,15,0.22) 50%, rgba(220,220,220,0.08) 50%);
}

.card-index {
  position: absolute; top: 22px; left: 26px;
  font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.08em;
  z-index: 2;
}
.card-name {
  font-size: 2.1rem; font-weight: 800; line-height: 1.1; letter-spacing: -0.02em; color: var(--text);
  position: relative; z-index: 2;
}

.stamp {
  position: absolute; opacity: 0; z-index: 3;
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
  padding: 6px 14px; border-radius: 8px; border: 2px solid;
}
.stamp-mil  { top: 24px; left: 24px;  color: #7a9a5a; border-color: #7a9a5a; background: rgba(80,110,50,0.15); transform: rotate(-8deg); }
.stamp-poke { top: 24px; right: 24px; color: #e03030; border-color: #e03030; background: rgba(200,30,30,0.10); transform: rotate(8deg); }

.actions { display: flex; gap: 12px; margin-top: 28px; }

.btn {
  height: 54px; padding: 0 26px; border-radius: 14px; border: none;
  font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
  transition: transform 0.12s, box-shadow 0.12s;
  display: flex; align-items: center; gap: 9px; position: relative; overflow: hidden;
}
.btn:active { transform: scale(0.95) !important; }

.btn-mil {
  color: #d4cfb0; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  background-color: #3a4a2e;
  background-image:
    radial-gradient(ellipse 38px 24px at 12% 30%, #2d3a22 0%, transparent 100%),
    radial-gradient(ellipse 28px 36px at 55% 70%, #4a5e35 0%, transparent 100%),
    radial-gradient(ellipse 42px 20px at 80% 20%, #2a3520 0%, transparent 100%),
    radial-gradient(ellipse 22px 30px at 30% 80%, #506040 0%, transparent 100%),
    radial-gradient(ellipse 35px 25px at 70% 60%, #3d4f2a 0%, transparent 100%);
  text-shadow: 0 1px 3px rgba(0,0,0,0.6); border: 1px solid #506038;
}
.btn-mil:hover { transform: translateY(-1px); box-shadow: 0 6px 26px rgba(0,0,0,0.6); }
.btn-mil-icon {
  width: 20px; height: 20px; flex-shrink: 0; border-radius: 50%;
  border: 2px solid rgba(212,207,176,0.5);
  display: flex; align-items: center; justify-content: center; font-size: 0.65rem;
}

.btn-poke { color: #fff; box-shadow: 0 4px 20px rgba(180,20,20,0.35); padding: 0; width: 154px; overflow: hidden; border: 1px solid #c01010; }
.btn-poke:hover { transform: translateY(-1px); box-shadow: 0 6px 26px rgba(180,20,20,0.5); }
.pokeball-btn { width: 100%; height: 100%; display: flex; flex-direction: column; }
.pb-top { flex: 1; background: #cc1a1a; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.9); }
.pb-mid { height: 5px; background: #111; position: relative; display: flex; align-items: center; justify-content: center; z-index: 2; }
.pb-mid::before { content: ''; position: absolute; left: 50%; transform: translateX(-50%); width: 14px; height: 14px; border-radius: 50%; background: #222; border: 2px solid #111; box-shadow: 0 0 0 2px #555; }
.pb-bot { flex: 1; background: #e8e8e8; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #111; }

.hint { margin-top: 16px; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

/* ─── REVEAL ─── */
.reveal {
  position: fixed; bottom: 26px; left: 50%;
  transform: translateX(-50%) translateY(90px); opacity: 0;
  z-index: 190; background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 14px 20px 16px;
  min-width: 280px; max-width: 340px; text-align: center;
  box-shadow: 0 8px 36px rgba(0,0,0,0.5);
  transition: transform 0.38s cubic-bezier(.34,1.56,.64,1), opacity 0.38s cubic-bezier(.34,1.56,.64,1);
}
.reveal.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.reveal-tag { display: inline-block; font-size: 0.52rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; padding: 4px 10px; border-radius: 100px; margin-bottom: 8px; }
.tag-mil  { background: #3a4a2e; color: #a8c080; border: 1px solid #506038; }
.tag-poke { background: linear-gradient(to bottom, #cc1a1a 50%, #e8e8e8 50%); border: 1px solid #555; overflow: hidden; }
.tag-poke span { background: linear-gradient(to bottom, #fff 50%, #111 50%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.reveal-name { display: block; font-size: 1rem; font-weight: 800; color: var(--text); margin-bottom: 4px; }
.reveal-desc { font-size: 0.63rem; color: var(--muted); line-height: 1.55; font-family: 'DM Mono', monospace; }

/* ─── RESULT ─── */
#result { gap: 26px; }

.result-mode-badge {
  font-size: 0.6rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
  padding: 5px 14px; border-radius: 100px;
}
.result-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
.result-score { font-size: 6rem; font-weight: 800; line-height: 1; letter-spacing: -0.04em; }
.result-sub { font-size: 0.78rem; color: var(--muted); max-width: 260px; line-height: 1.6; text-align: center; }

.result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 300px; }
.rg-tile { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
.rg-val { font-size: 2rem; font-weight: 800; font-family: 'DM Mono', monospace; line-height: 1; }
.rg-lbl { font-size: 0.53rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

.result-btns { display: flex; gap: 10px; }
.btn-replay {
  height: 50px; padding: 0 28px; border-radius: 14px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-family: 'Syne', sans-serif;
  font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; transition: transform 0.12s, background 0.15s;
}
.btn-replay:hover { background: var(--subtle); transform: translateY(-1px); }
.btn-replay:active { transform: scale(0.96); }
.btn-menu {
  height: 50px; padding: 0 28px; border-radius: 14px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-family: 'Syne', sans-serif;
  font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; transition: transform 0.12s, color 0.15s;
}
.btn-menu:hover { color: var(--text); transform: translateY(-1px); }

/* ─── GAME OVER OVERLAY ─── */
#gameover-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.85);
  display: none; align-items: center; justify-content: center; flex-direction: column; gap: 10px;
  backdrop-filter: blur(6px);
}
#gameover-overlay.show { display: flex; animation: gofade 0.3s ease both; }
@keyframes gofade { from { opacity:0; } to { opacity:1; } }
.go-icon  { font-size: 3rem; }
.go-title { font-size: 2.2rem; font-weight: 800; color: var(--wrong); letter-spacing: -0.02em; }
.go-sub   { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
</style>
</head>
<body>

<div id="flash"></div>
<div class="progress" id="progress"></div>

<header id="header" style="display:none">
  <button class="btn-back-menu" onclick="goMenu()">← Menu</button>
  <div class="header-right">
    <div class="lives" id="lives"></div>
    <div class="stats">
      <div class="stat">
        <span class="stat-val" id="s-correct" style="color:var(--correct)">0</span>
        <span class="stat-lbl">Correct</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <span class="stat-val" id="s-wrong" style="color:var(--wrong)">0</span>
        <span class="stat-lbl">Wrong</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat">
        <span class="stat-val" id="s-streak">0</span>
        <span class="stat-lbl">Streak</span>
      </div>
    </div>
  </div>
</header>

<!-- ═══ MENU ═══ -->
<div class="screen active" id="menu">
  <div class="menu-header">
    <h1>Pokémon or Military?</h1>
    <p>96 names — can you tell them apart?</p>
  </div>
  <div class="mode-cards">
    <button class="mode-card infinite" onclick="startGame('infinite')">
      <div class="mode-icon">∞</div>
      <div class="mode-info">
        <div class="mode-name">Infinite</div>
        <div class="mode-desc">Go through all 96 cards with no penalty.<br>Perfect for learning.</div>
      </div>
      <div class="mode-badge badge-inf">Chill</div>
    </button>
    <button class="mode-card survival" onclick="startGame('survival')">
      <div class="mode-icon">❤️</div>
      <div class="mode-info">
        <div class="mode-name">Survival</div>
        <div class="mode-desc">3 lives. One wrong answer costs a life.<br>Lose them all — game over.</div>
      </div>
      <div class="mode-badge badge-surv">Hard</div>
    </button>
  </div>
</div>

<!-- ═══ GAME ═══ -->
<div class="screen" id="game">
  <div class="scene">
    <div class="card-behind-2"></div>
    <div class="card-behind"></div>
    <div class="card" id="card">
      <div class="card-camo"      id="camo"></div>
      <div class="card-poke-tint" id="poke-tint"></div>
      <div class="stamp stamp-mil"  id="stamp-mil">Military Op</div>
      <div class="stamp stamp-poke" id="stamp-poke">Pokémon TCG</div>
      <div class="card-index" id="card-index">01 / 96</div>
      <div class="card-name"  id="card-name">—</div>
    </div>
  </div>
  <div class="actions">
    <button class="btn btn-mil" onclick="guess('Military')">
      <div class="btn-mil-icon">✛</div>Military
    </button>
    <button class="btn btn-poke" onclick="guess('Pokemon')">
      <div class="pokeball-btn">
        <div class="pb-top">Pokémon</div>
        <div class="pb-mid"></div>
        <div class="pb-bot">TCG</div>
      </div>
    </button>
  </div>
  <div class="hint" id="hint">96 cards remaining · ← → arrow keys</div>
</div>

<!-- ═══ RESULT ═══ -->
<div class="screen" id="result">
  <div class="result-mode-badge" id="r-mode-badge"></div>
  <div class="result-label">Final Score</div>
  <div class="result-score" id="r-score">0</div>
  <div class="result-sub" id="r-sub">—</div>
  <div class="result-grid">
    <div class="rg-tile"><span class="rg-val" id="r-correct" style="color:var(--correct)">0</span><span class="rg-lbl">Correct</span></div>
    <div class="rg-tile"><span class="rg-val" id="r-wrong"   style="color:var(--wrong)">0</span><span class="rg-lbl">Wrong</span></div>
    <div class="rg-tile"><span class="rg-val" id="r-mil">0</span><span class="rg-lbl">Military Found</span></div>
    <div class="rg-tile"><span class="rg-val" id="r-poke" style="color:#cc1a1a">0</span><span class="rg-lbl">Pokémon Found</span></div>
  </div>
  <div class="result-btns">
    <button class="btn-replay" onclick="replayMode()">Play Again</button>
    <button class="btn-menu"   onclick="goMenu()">← Menu</button>
  </div>
</div>

<!-- ═══ GAME OVER OVERLAY ═══ -->
<div id="gameover-overlay">
  <div class="go-icon">💀</div>
  <div class="go-title">Game Over</div>
  <div class="go-sub">All lives lost</div>
</div>

<!-- ═══ REVEAL POPUP ═══ -->
<div class="reveal" id="reveal">
  <span class="reveal-tag"  id="rev-tag"></span>
  <span class="reveal-name" id="rev-name"></span>
  <span class="reveal-desc" id="rev-desc"></span>
</div>

<script>
const DATA=[{N:"Rolling Thunder",T:"Military",D:"U.S. bombing campaign in North Vietnam (1965–68)"},{N:"Urgent Fury",T:"Military",D:"U.S.-led invasion of Grenada (1983)"},{N:"Infinite Reach",T:"Military",D:"U.S. missile strikes on al-Qaeda sites (1998)"},{N:"Epic Fury",T:"Military",D:"U.S.-led strikes on Iranian military targets (2026)"},{N:"Crimson Tide",T:"Military",D:"Single-day U.S. SEAL raid in Vietnam (1967)"},{N:"Emerald Warrior",T:"Military",D:"Annual U.S. Special Forces exercise (since 2014)"},{N:"Ocean Shield",T:"Military",D:"NATO anti-piracy operation off Somalia (2009–2016)"},{N:"Thunder Bolt",T:"Military",D:"Israeli raid to rescue hostages in Uganda (1976)"},{N:"Artic Edge",T:"Military",D:"Joint U.S.-Canada Arctic defense exercise (2022)"},{N:"Phantom Phoenix",T:"Military",D:"U.S.-led surge in Iraq (2008)"},{N:"Solar Sunrise",T:"Military",D:"U.S. counter-intelligence op targeting Pentagon hackers"},{N:"Celestial Balance",T:"Military",D:"JSOC raid killing Al-Shabaab leader in Somalia (2009)"},{N:"Iron Swords",T:"Military",D:"Israeli operation in Gaza against Hamas (2023–24)"},{N:"Pillar of Defense",T:"Military",D:"Israeli campaign in Gaza targeting Hamas (2012)"},{N:"Talisman Sabre",T:"Military",D:"Biennial U.S.-Australia joint exercise (since 2005)"},{N:"Sky Shield",T:"Military",D:"NORAD air-defense exercises simulating Soviet attacks (1960–62)"},{N:"Unified Protector",T:"Military",D:"NATO air campaign in Libya (2011)"},{N:"Frostbite",T:"Military",D:"U.S. Arctic naval/air exercise (1946)"},{N:"Desert Storm",T:"Military",D:"U.S.-led Gulf War — liberation of Kuwait (1991)"},{N:"Phantom Fury",T:"Military",D:"Second Battle of Fallujah (2004)"},{N:"Tidal Wave",T:"Military",D:"WWII U.S. air raid on Ploiești oil refineries (1943)"},{N:"Fireball",T:"Military",D:"Nigerian offensive against Boko Haram (2020)"},{N:"Infinite Justice",T:"Military",D:"U.S.-led invasion of Afghanistan (2001)"},{N:"Stellar Wind",T:"Military",D:"U.S. warrantless domestic surveillance pr ing Munich Olympic attackers (1972–73)"},{N:"Frequent Wind",T:"Military",D:"Final helicopter evacuation of Saigon (1975)"},{N:"Flea Flicker",T:"Military",D:"U.S.-Iraqi sweep in Baghdad before referendum (2005)"},{N:"Skyridge",T:"Pokemon",D:"Pokémon TCG expansion set · May 2003"},{N:"Sandstorm",T:"Pokemon",D:"Pokémon TCG expansion set · September 2003"},{N:"Unseen Forces",T:"Pokemon",D:"Pokémon TCG expansion set · August 2005"},{N:"Crystal Guardians",T:"Pokemon",D:"Pokémon TCG expansion set · August 2006"},{N:"Power Keepers",T:"Pokemon",D:"Pokémon TCG expansion set · February 2007"},{N:"Stormfront",T:"Pokemon",D:"Pokémon TCG expansion set · November 2008"},{N:"Rising Rivals",T:"Pokemon",D:"Pokémon TCG expansion set · May 2009"},{N:"Supreme Victors",T:"Pokemon",D:"Pokémon TCG expansion set · August 2009"},{N:"Boundaries Crossed",T:"Pokemon",D:"Pokémon TCG expansion set · November 2012"},{N:"Plasma Storm",T:"Pokemon",D:"Pokémon TCG expansion set · February 2013"},{N:"Emerging Powers",T:"Pokemon",D:"Pokémon TCG expansion set · August 2011"},{N:"Noble Victories",T:"Pokemon",D:"Pokémon TCG expansion set · November 2011"},{N:"Roaring Skies",T:"Pokemon",D:"Pokémon TCG expansion set · May 2015"},{N:"Fates Collide",T:"Pokemon",D:"Pokémon TCG expansion set · May 2016"},{N:"Celestial Storm",T:"Pokemon",D:"Pokémon TCG expansion set · August 2018"},{N:"Unbroken Bonds",T:"Pokemon",D:"Pokémon TCG expansion set · May 2019"},{N:"Silver Tempest",T:"Pokemon",D:"Pokémon TCG expansion set · November 2022"},{N:"Lost Thunder",T:"Pokemon",D:"Pokémon TCG expansion set · November 2018"},{N:"Crimson Invasion",T:"Pokemon",D:"Pokémon TCG expansion set · November 2017"},{N:"Surging Sparks",T:"Pokemon",D:"Pokémon TCG expansion set · November 2024"},{N:"Aquapolis",T:"Pokemon",D:"Pokémon TCG expansion set · January 2003"},{N:"Dragon Frontiers",T:"Pokemon",D:"Pokémon TCG expansion set · November 2006"},{N:"Great Encounter",T:"Pokemon",D:"Pokémon TCG expansion set · February 2008"},{N:"Dragon Exalted",T:"Pokemon",D:"Pokémon TCG expansion set · August 2012"},{N:"Plasma Blast",T:"Pokemon",D:"Pokémon TCG expansion set · August 2013"},{N:"XY",T:"Pokemon",D:"Pokémon TCG expansion set · February 2014"},{N:"Breakpoint",T:"Pokemon",D:"Pokémon TCG expansion set · February 2016"},{N:"Steam Siege",T:"Pokemon",D:"Pokémon TCG expansion set · August 2016"},{N:"Unified Minds",T:"Pokemon",D:"Pokémon TCG expansion set · August 2019"},{N:"Cosmic Eclipse",T:"Pokemon",D:"Pokémon TCG expansion set · November 2019"},{N:"Brilliant Stars",T:"Pokemon",D:"Pokémon TCG expansion set · February 2022"},{N:"Astral Radiance",T:"Pokemon",D:"Pokémon TCG expansion set · May 2022"},{N:"Journey Together",T:"Pokemon",D:"Pokémon TCG expansion set · March 2025"},{N:"Black Bolt",T:"Pokemon",D:"Pokémon TCG expansion set · July 2025"},{N:"White Flare",T:"Pokemon",D:"Pokémon TCG expansion set · July 2025"},{N:"Ascended Heroes",T:"Pokemon",D:"Pokémon TCG expansion set · January 2026"},{N:"Perfect Order",T:"Pokemon",D:"Pokémon TCG expansion set · March 2026"},{N:"Darkness Ablaze",T:"Pokemon",D:"Pokémon TCG expansion set · August 2020"},{N:"Rebel Clash",T:"Pokemon",D:"Pokémon TCG expansion set · May 2020"},{N:"Forbidden Light",T:"Pokemon",D:"Pokémon TCG expansion set · May 2018"},{N:"Flashfire",T:"Pokemon",D:"Pokémon TCG expansion set · May 2014"},{N:"Call of Legends",T:"Pokemon",D:"Pokémon TCG expansion set · February 2011"},{N:"Majestic Dawn",T:"Pokemon",D:"Pokémon TCG expansion set · May 2008"},{N:"Delta Species",T:"Pokemon",D:"Pokémon TCG expansion set · October 2005"},{N:"Sword and Shield",T:"Pokemon",D:"Pokémon TCG expansion set · February 2020"},{N:"Neo Discovery",T:"Pokemon",D:"Pokémon TCG expansion set · June 2001"},{N:"Holon Phantom",T:"Pokemon",D:"Pokémon TCG expansion set · May 2006"},{N:"Legends Awakened",T:"Pokemon",D:"Pokémon TCG expansion set · August 2008"},{N:"Crown Zenith",T:"Pokemon",D:"Pokémon TCG expansion set · January 2023"}];

const GRADES_INF=[
  {min:90,t:"Classified-level knowledge. You know your ops and your sets.",c:"#22c55e"},
  {min:75,t:"Sharp. You clearly collect cards and follow world events.",c:"#22c55e"},
  {min:60,t:"Decent. A few misses, but mostly on target.",c:"#f59e0b"},
  {min:45,t:"50/50. Might be guessing more than thinking.",c:"#f59e0b"},
  {min:0, t:"You couldn't tell a Charizard from a B-2 bomber. Try again.",c:"#ef4444"}
];
const GRADES_SURV=[
  {min:80,t:"Flawless. You survived with barely a scratch.",c:"#22c55e"},
  {min:50,t:"Solid run. Kept your cool under pressure.",c:"#22c55e"},
  {min:25,t:"Decent effort before the lives ran out.",c:"#f59e0b"},
  {min:0, t:"Eliminated early. The cards got the better of you.",c:"#ef4444"}
];

const MAX_LIVES = 3;
const $=id=>document.getElementById(id);

let deck=[], idx=0, correct=0, wrong=0, streak=0, milH=0, pokeH=0;
let lives=MAX_LIVES, mode='infinite';
// FIX #1/#3: single authoritative state flag + pending timeout tracker
let busy=false, gameActive=false;
let drag=false, sx=0, cx=0;
let flyTimer=null, revealTimer=null, flashTimer=null, goTimer=null;

function shuffle(a){
  const b=[...a];
  for(let j=b.length-1;j>0;j--){
    const k=Math.floor(Math.random()*(j+1));
    [b[j],b[k]]=[b[k],b[j]];
  }
  return b;
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}

// FIX #1 & #3: goMenu cancels all pending timers and resets all state
function goMenu(){
  gameActive=false;
  busy=false;
  drag=false; cx=0;
  clearTimeout(flyTimer);
  clearTimeout(revealTimer);
  clearTimeout(flashTimer);
  clearTimeout(goTimer);
  // hide reveal immediately
  $('reveal').classList.remove('show');
  // hide gameover overlay if visible
  $('gameover-overlay').classList.remove('show');
  // reset flash
  $('flash').style.opacity='0';
  $('header').style.display='none';
  $('progress').style.width='0%';
  show('menu');
}

function startGame(m){
  mode=m;
  deck=shuffle(DATA);
  idx=correct=wrong=streak=milH=pokeH=0;
  lives=MAX_LIVES;
  gameActive=true;
  $('header').style.display='flex';
  renderLives();
  show('game');
  tick();
}

function replayMode(){ startGame(mode); }

function renderLives(){
  const el=$('lives');
  if(mode!=='survival'){ el.innerHTML=''; return; }
  el.innerHTML='';
  for(let i=0;i<MAX_LIVES;i++){
    const s=document.createElement('span');
    s.className='life'+(i>=lives?' lost':'');
    s.textContent='❤️';
    el.appendChild(s);
  }
}

function resetCardVisuals(){
  $('camo').style.opacity='0';
  $('poke-tint').style.opacity='0';
  $('stamp-mil').style.opacity='0';
  $('stamp-poke').style.opacity='0';
}

function tick(){
  // FIX #5: guard — don't run if we've navigated away
  if(!gameActive) return;

  if(idx>=deck.length){ endGame('finished'); return; }

  const card=$('card');
  // reset transform without triggering transition artifacts
  card.style.transition='none';
  card.style.transform='';
  card.style.opacity='1';
  resetCardVisuals();

  $('card-name').textContent=deck[idx].N;
  $('card-index').textContent=String(idx+1).padStart(2,'0')+' / '+deck.length;
  $('progress').style.width=((idx/deck.length)*100)+'%';
  $('hint').textContent=(deck.length-idx)+' cards remaining · ← → arrow keys';
  updateStats();
  busy=false;
}

function guess(type){
  // FIX #6: keyboard guard handled in listener; button guard here
  if(busy || !gameActive || idx>=deck.length) return;
  busy=true;

  const item=deck[idx];
  const ok=item.T===type;

  if(ok){
    correct++; streak++;
    if(type==='Pokemon') pokeH++; else milH++;
  } else {
    wrong++; streak=0;
    if(mode==='survival'){
      lives--;
      // FIX #7: actually apply shake animation
      shakeLife();
      renderLives();
      if(lives<=0){
        updateStats();
        flashScreen(false);
        showReveal(item);
        // FIX #2: fly doesn't increment idx — triggerGameOver does it once
        fly(type==='Military'?-1:1, ()=>{
          if(!gameActive) return;
          triggerGameOver();
        });
        return;
      }
    }
  }

  updateStats();
  flashScreen(ok);
  showReveal(item);
  fly(type==='Military'?-1:1, ()=>{
    if(!gameActive) return; // FIX #5
    idx++;
    tick();
  });
}

function fly(dir, cb){
  const card=$('card');
  card.style.transition='transform 0.36s cubic-bezier(.4,0,.2,1), opacity 0.3s ease';
  card.style.transform=`translateX(${dir*480}px) rotate(${dir*16}deg)`;
  card.style.opacity='0';
  clearTimeout(flyTimer);
  flyTimer=setTimeout(cb, 350);
}

function triggerGameOver(){
  // FIX #2: increment idx exactly once here
  idx++;
  const overlay=$('gameover-overlay');
  overlay.classList.add('show');
  clearTimeout(goTimer);
  goTimer=setTimeout(()=>{
    if(!gameActive) return; // FIX #5
    overlay.classList.remove('show');
    endGame('gameover');
  }, 1800);
}

// FIX #4: flash uses requestAnimationFrame to avoid class race conditions
function flashScreen(ok){
  const f=$('flash');
  clearTimeout(flashTimer);
  f.style.transition='none';
  f.style.background=ok?'rgba(34,197,94,0.2)':'rgba(239,68,68,0.2)';
  f.style.opacity='1';
  flashTimer=setTimeout(()=>{
    f.style.transition='opacity 0.5s ease';
    f.style.opacity='0';
  }, 130);
}

function showReveal(item){
  const r=$('reveal');
  const isMil=item.T==='Military';
  r.className='reveal show';
  const tag=$('rev-tag');
  if(isMil){
    tag.className='reveal-tag tag-mil';
    tag.innerHTML='Military Operation';
  } else {
    tag.className='reveal-tag tag-poke';
    tag.innerHTML='<span>Pokémon TCG Set</span>';
  }
  $('rev-name').textContent=item.N;
  $('rev-desc').textContent=item.D;
  clearTimeout(revealTimer);
  revealTimer=setTimeout(()=>r.classList.remove('show'), 2700);
}

// FIX #7: shake is now actually used
function shakeLife(){
  const livesEl=$('lives');
  livesEl.classList.remove('shake');
  // force reflow to restart animation
  void livesEl.offsetWidth;
  livesEl.classList.add('shake');
  setTimeout(()=>livesEl.classList.remove('shake'), 350);
}

function updateStats(){
  $('s-correct').textContent=correct;
  $('s-wrong').textContent=wrong;
  $('s-streak').textContent=streak;
}

function endGame(reason){
  gameActive=false;
  $('header').style.display='none';
  show('result');

  const grades = mode==='survival' ? GRADES_SURV : GRADES_INF;
  // FIX #2 consequence: idx is now always the count of cards seen
  const total = mode==='survival' ? idx : deck.length;
  const pct   = total>0 ? Math.round((correct/total)*100) : 0;
  const g = grades.find(x=>pct>=x.min);

  const badge=$('r-mode-badge');
  if(mode==='infinite'){
    badge.textContent='∞ Infinite Mode';
    badge.style.cssText='background:rgba(74,94,56,0.3);color:#7ab055;border:1px solid #4a5e38;';
  } else {
    badge.textContent='❤️ Survival Mode';
    badge.style.cssText='background:rgba(139,32,32,0.3);color:#e05555;border:1px solid #8b2020;';
  }

  $('r-score').textContent = mode==='survival' ? correct+' pts' : correct+'/'+total;
  $('r-score').style.color  = g.c;
  $('r-sub').textContent    = reason==='gameover'
    ? 'Out after '+idx+' cards. '+g.t
    : g.t;

  $('r-correct').textContent=correct;
  $('r-wrong').textContent=wrong;
  $('r-mil').textContent=milH;
  $('r-poke').textContent=pokeH;
  $('progress').style.width='100%';
}

// FIX #6: keyboard only fires when game screen is active
document.addEventListener('keydown', e=>{
  if(!gameActive) return;
  if(e.key==='ArrowLeft')  guess('Military');
  if(e.key==='ArrowRight') guess('Pokemon');
});

// ─── DRAG ───
const cardEl=$('card');

function onDragStart(e){
  if(busy||!gameActive) return;
  drag=true;
  sx=e.touches?e.touches[0].clientX:e.clientX;
  cardEl.style.transition='none';
}

function onDragMove(e){
  if(!drag) return;
  cx=(e.touches?e.touches[0].clientX:e.clientX)-sx;
  cardEl.style.transform=`translateX(${cx}px) rotate(${cx*0.055}deg)`;
  const threshold=60, absX=Math.abs(cx);
  const ratio=Math.max(0, Math.min(1, (absX-threshold)/80));
  if(cx < -threshold){
    $('stamp-mil').style.opacity=ratio;
    $('stamp-poke').style.opacity='0';
    $('camo').style.opacity=ratio*0.85;
    $('poke-tint').style.opacity='0';
  } else if(cx > threshold){
    $('stamp-poke').style.opacity=ratio;
    $('stamp-mil').style.opacity='0';
    $('camo').style.opacity='0';
    $('poke-tint').style.opacity=ratio*0.9;
  } else {
    resetCardVisuals();
  }
}

function onDragEnd(){
  if(!drag) return;
  drag=false;
  if     (cx < -80) guess('Military');
  else if(cx >  80) guess('Pokemon');
  else {
    cardEl.style.transition='transform 0.35s cubic-bezier(.34,1.56,.64,1)';
    cardEl.style.transform='';
    resetCardVisuals();
  }
  cx=0;
}

cardEl.addEventListener('mousedown',  onDragStart);
cardEl.addEventListener('touchstart', onDragStart, {passive:true});
document.addEventListener('mousemove',  onDragMove);
document.addEventListener('touchmove',  onDragMove, {passive:true});
document.addEventListener('mouseup',    onDragEnd);
document.addEventListener('touchend',   onDragEnd);
</script>
